<!DOCTYPE html>
<html>
<head>
    <title>Hello World Button</title>
</head>
<body>

    <h2>Click the button</h2>

    <button onclick="showMessage()">Click Me</button>

    <p id="output"></p>

    <script>
        function showMessage() {
            document.getElementById("output").innerHTML = "Hello World";
        }
    </script>

</body>
</html>
